<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>3310 Scout — REBUILT 2026</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0b0b16">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<style>
/* ─── RESET & DESIGN TOKENS ─── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0b0b16; --surf:#141422; --surf2:#1c1c30; --surf3:#24243c; --surf4:#2e2e4a;
  --gold:#f0a500; --gold-d:rgba(240,165,0,.13);
  --red:#e8534a;  --red-d:rgba(232,83,74,.13);
  --blue:#4a8fe8; --blue-d:rgba(74,143,232,.13);
  --green:#4caf7d; --green-d:rgba(76,175,125,.13);
  --text:#f0f0f8; --text2:#8888aa; --text3:#454567;
  --border:rgba(255,255,255,.07);
  --r:14px; --r-sm:9px; --sh:0 4px 24px rgba(0,0,0,.5);
}
html,body{
  height:100%;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:var(--bg);color:var(--text);overflow:hidden;font-size:16px
}

/* ─── SCREENS ─── */
.screen{position:fixed;inset:0;display:none;flex-direction:column;overflow:hidden}
.screen.active{display:flex}

/* ─── HEADER ─── */
.hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 14px;
  padding-top:max(14px,env(safe-area-inset-top,14px));
  background:var(--surf);border-bottom:1px solid var(--border);
  flex-shrink:0;z-index:20;gap:8px
}
.hdr-mid{flex:1;min-width:0;text-align:center}
.hdr-title{font-size:16px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:.2px}
.hdr-sub{font-size:11px;color:var(--text2);margin-top:2px}
.hdr-btn{
  background:var(--surf2);border:1px solid var(--border);border-radius:var(--r-sm);
  padding:8px 13px;color:var(--text);font-size:13px;font-weight:600;
  cursor:pointer;white-space:nowrap;min-width:62px;text-align:center;
  transition:opacity .15s;font-family:inherit
}
.hdr-btn:active{opacity:.65}
.hdr-btn.gold{background:var(--gold);color:#000;border-color:var(--gold)}
.hdr-btn.red-btn{background:var(--red);color:#fff;border-color:var(--red)}

/* ─── PROGRESS BAR ─── */
.prog{display:flex;gap:5px;padding:9px 14px;background:var(--surf);border-bottom:1px solid var(--border);flex-shrink:0}
.prog-pip{flex:1;height:3px;background:var(--surf4);border-radius:2px;transition:background .3s}
.prog-pip.on{background:var(--gold)}

/* ─── SCROLL AREA ─── */
.body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 14px 100px}

/* ─── BOTTOM TABS ─── */
.tabs{
  display:flex;background:var(--surf);border-top:1px solid var(--border);
  padding-bottom:max(8px,env(safe-area-inset-bottom,8px));flex-shrink:0
}
.tab{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:8px 4px 6px;gap:4px;border:none;background:none;
  color:var(--text3);font-size:10px;font-weight:700;letter-spacing:.6px;
  text-transform:uppercase;cursor:pointer;transition:color .2s;font-family:inherit
}
.tab.on{color:var(--gold)}
.tab svg{width:21px;height:21px;stroke-width:2}

/* ─── CARD ─── */
.card{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:12px}
.card-hd{font-size:10px;font-weight:800;letter-spacing:1.3px;text-transform:uppercase;color:var(--gold);margin-bottom:14px}

/* ─── COUNTER ─── */
.ctr{margin-bottom:10px}
.ctr-lbl{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:6px}
.ctr-box{background:var(--surf2);border-radius:var(--r-sm);overflow:hidden}
.ctr-num{
  font-size:48px;font-weight:900;text-align:center;
  padding:10px 0 2px;line-height:1;
  font-variant-numeric:tabular-nums;letter-spacing:-1px;
  transition:transform .07s
}
.ctr-num.pop{transform:scale(1.2)}
/* editable counter input overrides */
input.ctr-num{
  width:100%;display:block;background:transparent;border:none;border-radius:0;
  color:inherit;outline:none;-webkit-appearance:none;appearance:none;
  -moz-appearance:textfield
}
input.ctr-num::-webkit-inner-spin-button,
input.ctr-num::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
input.ctr-num:focus{border:none;box-shadow:inset 0 -2px 0 var(--gold)}

/* ─── SLIDER INPUT ─── */
.ctr-btns-row{display:flex;gap:1px}
.ctr-slider-wrap{display:none;padding:6px 12px 12px}
body.slider-mode .ctr-btns-row{display:none}
body.slider-mode .ctr-slider-wrap{display:block}
.ctr-slider{
  width:100%;height:44px;cursor:pointer;
  -webkit-appearance:none;appearance:none;background:transparent;
  touch-action:manipulation;display:block
}
.ctr-slider::-webkit-slider-runnable-track{
  height:8px;background:var(--surf4);border-radius:4px
}
.ctr-slider::-webkit-slider-thumb{
  -webkit-appearance:none;width:34px;height:34px;border-radius:50%;
  background:var(--gold);margin-top:-13px;box-shadow:0 2px 8px rgba(0,0,0,.5)
}
.ctr-slider::-moz-range-track{height:8px;background:var(--surf4);border-radius:4px}
.ctr-slider::-moz-range-thumb{width:34px;height:34px;border-radius:50%;background:var(--gold);border:none;box-shadow:0 2px 8px rgba(0,0,0,.5)}
.ctr-slider::-ms-track{height:8px;background:var(--surf4);border-radius:4px;color:transparent;border:none}
.ctr-slider::-ms-thumb{width:34px;height:34px;border-radius:50%;background:var(--gold);border:none}
.ctr.foul .ctr-slider::-webkit-slider-thumb{background:var(--red)}
.ctr.foul .ctr-slider::-moz-range-thumb{background:var(--red)}
/* foul counters: always buttons, never slider, ±1 only */
.ctr.foul .ctr-btns-row{display:flex!important}
.ctr.foul .ctr-slider-wrap{display:none!important}

/* ─── TAB BACKGROUND TINTS ─── */
body.tab-auton #sc-match .body{background:rgba(74,143,232,.10)}
body.tab-teleop #sc-match .body{background:rgba(232,83,74,.10)}
body.tab-auton #sc-match .card{border-color:rgba(74,143,232,.24)}
body.tab-teleop #sc-match .card{border-color:rgba(232,83,74,.24)}
body.tab-auton #sc-match .hdr{border-bottom-color:rgba(74,143,232,.35)}
body.tab-teleop #sc-match .hdr{border-bottom-color:rgba(232,83,74,.35)}
body.tab-auton #sc-match .tabs{border-top-color:rgba(74,143,232,.35)}
body.tab-teleop #sc-match .tabs{border-top-color:rgba(232,83,74,.35)}
body.tab-auton #sc-match .prog{background:rgba(74,143,232,.09)}
body.tab-teleop #sc-match .prog{background:rgba(232,83,74,.09)}

/* ─── SHOOTER SPEED GRID ─── */
.spd-grid2{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.spd-grid2-b{
  width:100%;padding:11px 10px;background:var(--surf2);border:2px solid var(--border);
  border-radius:var(--r-sm);color:var(--text2);font-size:12px;font-weight:700;
  cursor:pointer;text-align:left;line-height:1.3;transition:all .15s;touch-action:manipulation;
  font-family:inherit
}
.spd-grid2-b.on{border-color:var(--gold);background:var(--gold-d);color:var(--gold)}

/* ─── RATE INLINE ─── */
.rate-inline{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--surf3);border-radius:0 0 var(--r-sm) var(--r-sm);margin-top:-1px;margin-bottom:10px}
.rate-bps{font-size:17px;font-weight:900;font-variant-numeric:tabular-nums;color:var(--text);min-width:76px;white-space:nowrap}

/* ─── PIT ARCHETYPE GRID ─── */
.arch-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.arch-b{padding:13px 8px;background:var(--surf2);border:2px solid var(--border);border-radius:var(--r-sm);color:var(--text2);font-size:12px;font-weight:700;cursor:pointer;text-align:center;line-height:1.35;transition:all .15s;touch-action:manipulation}
.arch-b.on{border-color:var(--blue);background:var(--blue-d);color:var(--blue)}

/* mode segment */
.mode-seg{display:flex;background:var(--surf3);border-radius:var(--r-sm);padding:3px;gap:3px;margin-bottom:12px}
.mode-seg-b{flex:1;padding:7px 6px;border:none;background:transparent;color:var(--text3);font-size:12px;font-weight:700;cursor:pointer;border-radius:6px;transition:all .15s;text-align:center;font-family:inherit;touch-action:manipulation}
.mode-seg-b.on{background:var(--surf4);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.35)}

/* HOME BANNER */
.home-banner{
  background:linear-gradient(135deg,var(--surf) 0%,rgba(240,165,0,.07) 100%);
  border-bottom:1px solid rgba(240,165,0,.22);
  padding:14px 20px 12px;display:flex;align-items:center;
  justify-content:center;gap:14px;flex-shrink:0;
  padding-top:max(16px,env(safe-area-inset-top,16px))
}
.banner-logo{flex-shrink:0}
.banner-title{font-size:19px;font-weight:900;letter-spacing:-.3px;line-height:1.15}
.banner-sub{font-size:11px;color:var(--text2);margin-top:3px;letter-spacing:.3px}

/* INFO SCREEN */
.info-section{margin-bottom:14px}
.info-rule{display:flex;justify-content:space-between;align-items:baseline;
  padding:7px 0;border-bottom:1px solid var(--border);font-size:14px}
.info-rule:last-child{border-bottom:none}
.info-k{color:var(--text2);font-size:13px}
.info-v{font-weight:800;color:var(--gold)}
.ctr-row{display:flex;gap:1px}
.cb{
  flex:1;border:none;cursor:pointer;font-weight:900;
  font-family:inherit;line-height:1;
  transition:filter .08s;user-select:none;-webkit-user-select:none;
  touch-action:manipulation;
}
.cb:active{filter:brightness(.7)}
.cb-big{font-size:26px;padding:15px 0;background:var(--surf3);color:var(--text2)}
.cb-big.plus{background:var(--gold);color:#000;flex:2.5}
.cb-sm{font-size:13px;padding:10px 0;background:var(--surf4);color:var(--text3)}
.cb-sm.p5{background:rgba(240,165,0,.18);color:var(--gold)}
/* foul variant */
.ctr.foul .ctr-num{color:var(--red)}
.ctr.foul .cb-big.plus{background:var(--red);color:#fff}
.ctr.foul .cb-sm.p5{background:rgba(232,83,74,.2);color:var(--red)}

/* TOGGLE ROW */
.trow{
  display:flex;align-items:center;justify-content:space-between;
  padding:13px 0;border-bottom:1px solid var(--border);cursor:pointer;
  touch-action:manipulation;
}
.trow:last-child{border-bottom:none}
.trow-lbl{font-size:15px;font-weight:500}
.trow-sub{font-size:12px;color:var(--text2);margin-top:2px}
.tog{
  width:48px;height:27px;background:var(--surf3);border-radius:14px;
  position:relative;transition:background .2s;flex-shrink:0;
}
.tog.on{background:var(--gold)}
.tog.on.red{background:var(--red)}
.tog::after{
  content:'';position:absolute;width:21px;height:21px;
  background:#fff;border-radius:50%;top:3px;left:3px;
  transition:transform .2s;box-shadow:0 1px 4px rgba(0,0,0,.35)
}
.tog.on::after{transform:translateX(21px)}

/* SEGMENT */
.seg{display:flex;background:var(--surf2);border-radius:var(--r-sm);padding:3px;gap:3px}
.seg-b{
  flex:1;padding:9px 3px;border:none;background:transparent;
  color:var(--text2);font-size:12px;font-weight:700;
  cursor:pointer;border-radius:6px;transition:all .15s;
  text-align:center;font-family:inherit;touch-action:manipulation;
}
.seg-b.on{background:var(--surf3);color:var(--text);box-shadow:0 1px 5px rgba(0,0,0,.4)}
.seg-b.on.g{background:var(--gold);color:#000}
.seg-b.on.r{background:var(--red);color:#fff}
.seg-b.on.b{background:var(--blue);color:#fff}

/* FORM FIELDS */
.lbl{font-size:11px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;
     color:var(--text2);margin-bottom:6px;margin-top:14px;display:block}
.lbl:first-child{margin-top:0}
input,select,textarea{
  width:100%;background:var(--surf2);border:1px solid var(--border);
  border-radius:var(--r-sm);padding:12px 14px;
  color:var(--text);font-size:16px;font-family:inherit;
  outline:none;-webkit-appearance:none;appearance:none;
  transition:border-color .15s
}
input:focus,select:focus,textarea:focus{border-color:var(--gold)}
input.big{font-size:26px;font-weight:800;text-align:center;padding:13px}
textarea{resize:none;min-height:82px;line-height:1.5}
select option{background:var(--surf2)}

/* ALLIANCE PICK */
.ally{display:flex;gap:10px}
.ally-b{
  flex:1;padding:16px 8px;border-radius:var(--r);border:2px solid var(--border);
  cursor:pointer;text-align:center;font-size:16px;font-weight:800;
  background:var(--surf2);color:var(--text2);transition:all .15s;
  touch-action:manipulation;
}
.ally-b:active{transform:scale(.97)}
.ally-b.r.on{border-color:var(--red);background:var(--red-d);color:var(--red)}
.ally-b.b.on{border-color:var(--blue);background:var(--blue-d);color:var(--blue)}

/* START POSITIONS */
.pos-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px}
.pos-b{
  padding:11px 4px;background:var(--surf2);border:2px solid var(--border);
  border-radius:var(--r-sm);color:var(--text2);font-size:11px;font-weight:700;
  cursor:pointer;text-align:center;line-height:1.38;transition:all .15s;
  touch-action:manipulation;
}
.pos-b.on{border-color:var(--gold);background:var(--gold-d);color:var(--gold)}

/* SPEED GRID */
.spd-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px}
.spd-b{
  padding:10px 4px;background:var(--surf2);border:2px solid var(--border);
  border-radius:var(--r-sm);color:var(--text2);font-size:11px;font-weight:700;
  cursor:pointer;text-align:center;line-height:1.4;transition:all .15s;
  touch-action:manipulation;
}
.spd-b .tier{font-size:15px;font-weight:900;color:var(--text);display:block;margin-bottom:2px}
.spd-b.on{border-color:var(--gold);background:var(--gold-d);color:var(--gold)}
.spd-b.on .tier{color:var(--gold)}

/* CHIPS */
.chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:8px}
.chip{
  padding:8px 14px;background:var(--surf2);border:2px solid var(--border);
  border-radius:20px;color:var(--text2);font-size:13px;font-weight:600;
  cursor:pointer;transition:all .15s;touch-action:manipulation;
}
.chip.on{border-color:var(--blue);background:var(--blue-d);color:var(--blue)}

/* DRIVETRAIN GRID */
.dt-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.dt-b{
  padding:14px 8px;background:var(--surf2);border:2px solid var(--border);
  border-radius:var(--r-sm);color:var(--text2);font-size:13px;font-weight:700;
  cursor:pointer;text-align:center;transition:all .15s;touch-action:manipulation;
}
.dt-b.on{border-color:var(--blue);background:var(--blue-d);color:var(--blue)}

/* DATA SUMMARY */
.sum{display:grid;grid-template-columns:auto 1fr;gap:6px 14px;font-size:13px}
.sum-k{color:var(--text2);font-weight:500}
.sum-v{font-weight:700;text-align:right}

/* BUTTONS */
.btn{
  width:100%;padding:15px;border:none;border-radius:var(--r);
  font-size:15px;font-weight:700;cursor:pointer;
  transition:all .15s;font-family:inherit;letter-spacing:.3px;
  margin-bottom:9px;touch-action:manipulation;
}
.btn:last-child{margin-bottom:0}
.btn:active{transform:scale(.98)}
.btn-gold{background:var(--gold);color:#000}
.btn-surf{background:var(--surf2);color:var(--text);border:1px solid var(--border)}
.btn-blue{background:var(--blue);color:#fff}
.btn-red{background:var(--red);color:#fff}

/* SAVED ITEM */
.si{
  display:flex;align-items:center;justify-content:space-between;
  padding:11px 12px;background:var(--surf2);border-radius:var(--r-sm);
  margin-bottom:10px
}
